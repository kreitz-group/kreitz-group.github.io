- title: "Linking Experimental and Ab-initio Thermochemistry of Adsorbates with a Generalized Thermochemical Hierarchy"
  authors: "Kreitz B, Abeywardane K, Goldsmith CF"
  journal: "Journal of Chemical Theory and Computation"
  year: 2023
  doi: "10.1021/acs.jctc.3c00112"
  url: "https://doi.org/10.1021/acs.jctc.3c00112"
  arxiv_id: null
  abstract: "Enthalpies of formation of adsorbates are crucial parameters in the microkinetic modeling of heterogeneously catalyzed reactions since they quantify the stability of intermediates on the catalyst surface. This quantity is often computed using density functional theory (DFT), as more accurate methods are computationally still too expensive, which means that the derived enthalpies have a large uncertainty. In this study, we propose a new error cancellation method to compute the enthalpies of formation of adsorbates from DFT more accurately through a generalized connectivity-based hierarchy. The enthalpy of formation is determined through a hypothetical reaction that preserves atomistic and bonding environments. The method is applied to a data set of 60 adsorbates on Pt(111) with up to 4 heavy (non-hydrogen) atoms. Enthalpies of formation of the fragments required for the bond balancing reactions are based on experimental heats of adsorption for Pt(111). The comparison of enthalpies of formation derived from different DFT functionals using the isodesmic reactions shows that the effect of the functional is significantly reduced due to the error cancellation. Thus, the proposed methodology creates an interconnected thermochemical network of adsorbates that combines experimental with ab initio thermochemistry in a single and more accurate thermophysical database."
  preprint: false
  corresponding_author: true
  featured: false
  image: "images_large_ct3c00112_0012.jpg"

- title: "Automated Generation of Microkinetics for Heterogeneously Catalyzed Reactions Considering Correlated Uncertainties"
  authors: "Kreitz B, Lott P, Medford AJ, Studt F, Deutschmann O, Goldsmith CF"
  journal: "Angewandte Chemie International Edition"
  year: 2023
  doi: "10.1002/anie.202306514"
  url: "https://doi.org/10.1002/anie.202306514"
  arxiv_id: null
  abstract: "The study presents an ab-initio based framework for the automated construction of microkinetic mechanisms considering correlated uncertainties in all energetic parameters and estimation routines. 2000 unique microkinetic models were generated within the uncertainty space of the BEEF-vdW functional for the oxidation reactions of representative exhaust gas emissions from stoichiometric combustion engines over Pt(111) and compared to experiments through multiscale modeling. The ensemble of simulations stresses the importance of considering uncertainties. Within this set of first-principles-based models, it is possible to identify a microkinetic mechanism that agrees with experimental data. This mechanism can be traced back to a single exchange-correlation functional, and it suggests that Pt(111) could be the active site for the oxidation of light hydrocarbons. The study provides a universal framework for the automated construction of reaction mechanisms with correlated uncertainty quantification, enabling a DFT-constrained microkinetic model optimization for other heterogeneously catalyzed systems."
  preprint: false
  corresponding_author: true
  featured: false
  image: "anie202306514-toc-0001-m.jpg"

- title: "Numerical and spatially-resolved experimental investigation of the CO2 methanation over Ni/γ-Al2O3 and Ni3.2Fe/γ-Al2O3 catalyst in a packed-bed reactor"
  authors: "Shirsath AB, Schulte ML, Kreitz B, Tischer S, Grunwaldt JD, Deutschmann O"
  journal: "Chemical Engineering Journal"
  year: 2023
  doi: "10.1016/j.cej.2023.143847"
  url: "https://doi.org/10.1016/j.cej.2023.143847"
  arxiv_id: null
  abstract: "CO2 methanation via the Sabatier reaction with (green) H2 is promising due to its role in achieving a carbon–neutral energy balance in the context of Power-to-Gas technologies. Since Ni-based catalysts are relatively inexpensive compared to other metals and exhibit high catalytic activity, they are most commonly used. Due to the exothermic nature of the reaction, strong temperature and concentration gradients occur, which influence the catalyst structure. Thus, revealing the effects of structural changes of the catalyst along the reactor bed on local activity and selectivity is essential. A 1D packed-bed reactor model was used for numerical simulations, coupled with detailed microkinetics and mass transport limitations. The simulation results are compared with axially-resolved concentration and temperature profiles over 17 wt% Ni/γ-Al2O3 and 17 wt% Ni3.2Fe/γ-Al2O3 catalysts at oven temperatures of 623 K and 723 K. Using additional information from structural spatially-resolved synchrotron-based operando X-ray absorption spectroscopy studies, the oxidation state of Ni was considered in modeling the reactor by changing the catalytically active surface area along the reactor. Predicted surface coverages are compared with surface species experimentally determined by diffuse reflectance infrared Fourier transform spectroscopy. Overall, this study demonstrates the importance of combining modeling with spatially-resolved and temperature-dependent experiments to improve multiscale models and make predictions more accurate."
  preprint: false
  corresponding_author: false
  featured: false
  image: "1-s2.0-S1385894723025780-ga1_lrg.jpg"

- title: "Detailed microkinetics for the oxidation of exhaust gas emissions through automated mechanism generation"
  authors: "Kreitz B, Lott P, Blöndal K, Bae J, Angeli S, Ulissi ZW, Studt F, Goldsmith CF, Deutschmann O"
  journal: "ACS Catalysis"
  year: 2022
  doi: "10.1021/acscatal.2c03378"
  url: "https://doi.org/10.1021/acscatal.2c03378"
  arxiv_id: null
  abstract: "Emissions from vehicles contain a variety of pollutants that must be either oxidized or reduced efficiently in the catalytic converter. Improvements to the catalyst require knowledge of the microkinetics, but the complexity of the exhaust gas mixture makes it challenging to identify the reaction network. This complexity was tackled by using the “Reaction Mechanism Generator” (RMG) to automatically generate microkinetic models for the oxidation of combustion byproducts from stoichiometric gasoline direct injection engines on Pt(111). The possibilities and the limitations encountered during the generation procedure are discussed in detail. A combination of first-principles-based mechanism construction and top-down parameter refinement allows a description of experimental results obtained by kinetic testing of a Pt/Al2O3 monolith under stoichiometric conditions. The study can serve as a blueprint for the usage of RMG for other challenging heterogeneously catalyzed reactions."
  preprint: false
  corresponding_author: true
  featured: false
  image: "images_large_cs2c03378_0009.jpeg"

- title: "Microkinetic modeling of the transient CO2 methanation with DFT-based uncertainties in a Berty reactor"
  authors: "Kreitz B, Wehinger GD, Goldsmith CF, Turek T"
  journal: "ChemCatChem"
  year: 2022
  doi: "10.1002/cctc.202200570"
  url: "https://doi.org/10.1002/cctc.202200570"
  arxiv_id: null
  abstract: "The transient operation of methanation reactors can become desirable when coupled with fluctuating renewable energies in Power-to-Gas scenarios, which requires suitable kinetic approaches that can describe the transient catalytic phenomena. A combined experimental and theoretical investigation of the transient CO2 methanation is conducted using concentration forcing to derive a suitable microkinetic model. Methanation experiments are performed with a Ni/SiO2 catalyst in a Berty-type reactor at industrially relevant conditions. The microkinetics are based on previous work and were automatically constructed for the Ni(111) facet using the Reaction Mechanism Generator. A feasible set of energetic parameters of the microkinetic models was identified in a theory-constrained optimization procedure within the DFT uncertainty space that can accurately reproduce the experimental results on a first-principles basis. The microkinetic model unravels that the formation of H2O* and CH3* control the activity and selectivity of Ni(111) under the investigated conditions."
  preprint: false
  corresponding_author: true
  featured: false
  image: "cctc202200570-toc-0001-m.jpg"

- title: "Assessment of concentration and temperature distribution for an exothermic reaction in a Berty reactor"
  authors: "Anderson S, Kreitz B, Turek T, Wehinger GD"
  journal: "Industrial & Engineering Chemistry Research"
  year: 2022
  doi: "10.1021/acs.iecr.2c01459"
  url: "https://doi.org/10.1021/acs.iecr.2c01459"
  arxiv_id: null
  abstract: "The Berty reactor is a continuously operated stirred tank reactor that is used in catalytic experiments to achieve gradientless conditions. Uniformity of the concentration profile has been confirmed through residence time measurements, but the temperature profiles originating from the heat of reaction have not been investigated yet. In this work, the profiles inside the reactor are investigated for the exothermic methanation of CO2 under typical operating conditions for kinetic measurements via Computational Fluid Dynamics simulations. The results indicate that temperature gradients in the vicinity of the catalyst can occur even though residence time measurements confirm uniformity of concentration. It was shown that a low conversion per pass is key to uniform conditions, which can be influenced by a high dilution ratio of the catalyst bed, high operating pressure, and high rotation speed."
  preprint: false
  corresponding_author: false
  featured: false
  image: "images_large_ie2c01459_0010.jpeg"

- title: "Quo vadis multiscale modeling in reaction engineering? – A perspective"
  authors: "Wehinger GD, Ambrosetti M, Cheula R, Ding ZB, Isoz M, Kreitz B, Kuhlmann K, Kutscherauer M, Niyogi K, Poissonnier J, Réocreux R, Rudolf D, Wagner J, Zimmermann R, Bracconi M, Freund H, Krewer U, Maestri M"
  journal: "Chemical Engineering Research and Design"
  year: 2022
  doi: "10.1016/j.cherd.2022.05.030"
  url: "https://doi.org/10.1016/j.cherd.2022.05.030"
  arxiv_id: null
  abstract: "This work reports the results of a perspective workshop held in summer 2021 discussing the current status and future needs for multiscale modeling in reaction engineering. This research topic is one of the most challenging and likewise most interdisciplinary in the chemical engineering community, today. Although it is progressing fast in terms of methods development, it is only slowly applied by most reaction engineers. Therefore, this perspective is aimed to promote this field and facilitate research and a common understanding. It involves the following areas: (1) reactors and cells with surface changes focusing on Density Functional Theory and Monte-Carlo simulations; (2) hierarchically-based microkinetic analysis of heterogeneous catalytic processes including structure sensitivity, microkinetic mechanism development, and parameter estimation; (3) coupling first-principles kinetic models and CFD simulations of catalytic reactors covering chemistry acceleration strategies and surrogate models; and finally (4) catalyst-reactor-plant systems with details on linking CFD with plant simulations, respectively. It therefore highlights recent achievements, challenges, and future needs for fueling this urgent research topic in reaction engineering."
  preprint: false
  corresponding_author: false
  featured: false
  image: "1-s2.0-S0263876222002568-gr1_lrg.jpg"

