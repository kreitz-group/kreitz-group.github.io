- title: "Dynamic simulation of the CO2 methanation in a micro-structured fixed-bed reactor"
  authors: "Kreitz B, Wehinger GD, Turek T"
  journal: "Chemical Engineering Science"
  year: 2019
  doi: "10.1016/j.ces.2018.09.053"
  url: "https://doi.org/10.1016/j.ces.2018.09.053"
  arxiv_id: null
  abstract: "The dynamic operation of methanation reactors is under discussion due to the increasing interest in power-to-gas technology. Here, hydrogen is supplied via a water electrolyzer which is powered by fluctuating renewable energy sources. With dynamic process modeling and simulation, the methanation reactor can be designed. Since the methanation reaction proceeds fast in the presence of an active catalyst and releases a large amount of reaction heat, the model has to account for the pellet phase in terms of energy, species mass and reaction. In this work, a dynamic 1D heterogeneous model is presented. The model describes a micro-structured fixed-bed reactor for the methanation of carbon dioxide under industrially relevant operating conditions with periodic oscillations of the inlet feed composition. The simulation shows that the hot spot temperature changes significantly during the periodic operation, both in position and magnitude. For high frequency changes the reactor behavior moves towards a thermally relaxed steady state. The outlet methane concentration in the dynamic operation does not reach the steady-state value. However, the model reveals interesting insights of the dynamic CO2 methanation, which will be accompanied with experiments in the future."
  preprint: false
  corresponding_author: true
  featured: false
  image: "1-s2.0-S0009250918307024-ga1_lrg.jpg"

- title: "Process modelling of an alkaline water electrolyzer"
  authors: "Haug P, Kreitz B, Koj M, Turek T"
  journal: "International Journal of Hydrogen Energy"
  year: 2017
  doi: "10.1016/j.ijhydene.2017.05.031"
  url: "https://doi.org/10.1016/j.ijhydene.2017.05.031"
  arxiv_id: null
  abstract: "In this paper a model for the prediction of the product gas purity in alkaline water electrolysis is proposed. For the estimation of the exhaust gas compositions the operating conditions, such as current density, electrolyte flow rate, concentration and temperature as well as process management possibilities are considered. The development of the model relies on a classical process engineering approach and depicts the electrolysis cell through coupled continuously stirred-tank reactors. Furthermore, the mass transport phenomena between the phases are considered through the application of Reynolds and Sherwood correlations. Finally, the validation of the model is performed through experiments, which are carried out in a lab-scale electrolyzer with a 150 cm2 zero-gap cell and KOH electrolyte at atmospheric pressure. This investigation reveals that gas purity in alkaline water electrolysis is mainly affected by mixing the anodic and cathodic electrolyte cycles, which transport dissolved electrolysis products into the opposite half cell compartments. However, this transport mechanism can be significantly reduced by adjustment of the operating conditions of the electrolyzer."
  preprint: false
  corresponding_author: false
  featured: false
  image: "1-s2.0-S0360319917318633-gr1_lrg.jpg"
