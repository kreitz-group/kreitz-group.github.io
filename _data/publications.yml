- title: "Modeling the Dynamic Power-to-Gas Process: Coupling Electrolysis with CO2 Methanation"
  authors: "Kreitz B, Brauns J, Wehinger GD, Turek T"
  journal: "Chemie Ingenieur Technik"
  year: 2020
  doi: "10.1002/cite.202000019"
  url: "https://doi.org/10.1002/cite.202000019"
  arxiv_id: null
  abstract: "The dynamic operation of a power-to-gas plant powered by wind energy is theoretically studied by coupling an empirical model of an alkaline water electrolyzer with a 1D heterogeneous model of a methanation reactor. H2 produced by the electrolyzer follows the wind power profile, but operation in the part-load range can raise safety concerns. The dynamically generated methane quality comes close to the required value for injection into the gas grid, if the stoichiometric ratio is controlled. To satisfy the gas quality at all times, it is necessary to design a more tolerant reactor."
