- title: "Thermophysical Properties of Adsorbates with Beyond-DFT Accuracy from DFT Data through Error Cancellation"
  authors: "Porter SG, Kreitz B"
  journal: "Faraday Discussions"
  year: 2026
  doi: "10.1039/D5FD00144G"
  url: "https://doi.org/10.1039/D5FD00144G"
  arxiv_id: null
  abstract: "Predictive multiscale modeling of heterogeneously catalyzed reactions requires accurate enthalpies of adsorbates. These properties are typically calculated from density functional theory (DFT) using exchange-correlation functionals with the generalized-gradient approximation (GGA) since more accurate electronic structure methods are not feasible. Therefore, the derived enthalpies are subject to large inaccuracies. We address this challenge through an error-cancellation approach that builds on the connectivity-based hierarchy (CBH) to derive enthalpies of formation of adsorbates with beyond-DFT accuracy without increasing computational cost. This method constructs reactions that conserve the electronic configuration between the target and the reference species, leading to error cancellation. The method is applied to adsorbates on Pt(111), Ni(111), and MgO(100). With the CBH method, it is possible to determine enthalpies of formation that are in excellent agreement with experimental measurements for a range of adsorbates and across many GGA exchange-correlation functionals, clearly outperforming conventional referencing approaches. Additionally, the method combines available experimental surface science data with gas-phase thermochemistry data and DFT data in a global thermochemical network. More accurate enthalpies of formation have a tremendous impact on the predictive performance of multiscale models and enable more conclusive insights into reaction mechanisms of catalytic reactions."
  preprint: false
  corresponding_author: true
  featured: false
  image: "faraday-toc.png"

- title: "Structure-Dependent Microkinetic Modeling of the CO2 Desorption with Surface Diffusion"
  authors: "Kreitz B, Kogekar G, Cheula R, Goldsmith CF"
  journal: "Journal of Catalysis"
  year: 2025
  doi: "10.1016/j.jcat.2025.116407"
  url: "https://doi.org/10.1016/j.jcat.2025.116407"
  arxiv_id: null
  abstract: "The interaction of CO2 with Ni catalysts is important for many industrial processes like methanation, which is known to be structure sensitive. Consequently, structure-dependent multiscale modeling is required to accurately capture the interaction of CO2 with the various Ni facets and to provide accurate atomistic insights. While mean-field multiscale models can be constructed for multifaceted nanoparticles, surface diffusion of adsorbates between the facets is often not considered. In this study, we close the gap by extending the open-source Cantera toolkit with a universal framework for surface diffusion between facets in mean-field microkinetic models, making it the first widely adopted software tool that includes these features. We leverage these updates to develop a thermodynamically consistent microkinetic model for a Ni nanoparticle consisting of Ni(111), Ni(100), Ni(211), and Ni(110) using data from DFT calculations and single-crystal experiments to unravel the interaction of CO2 with these facets through the simulation of temperature-programmed desorption profiles. Including surface diffusion and coverage effects into the mean-field microkinetic model leads to a significantly improved agreement between experiments from a  catalyst and the simulations. Through rigorous correlated uncertainty quantification of all structural and energetic parameters, we are able to identify a microkinetic model within the uncertainty space that is in excellent agreement with the recorded desorption profile. This model highlights that Ni(110), which contributes only to a small extent to the overall Ni surface area, dominates the desorption pattern and that surface diffusion plays a crucial role. The Cantera implementation is generic and can be applied to other metal nanoparticles and metal/metal oxide interfaces, providing a step towards closing the material gap."
  preprint: false
  corresponding_author: true
  featured: false
  image: "1-s2.0-S0021951725004737-ga1_lrg.jpg"

- title: "Influence of Coverage Dependence on the Thermophysical Properties of Adsorbates and Its Impact on Microkinetic Models"
  authors: "Bae J, Kreitz B, Peterson AA, Goldsmith CF"
  journal: "Journal of Chemical Information and Modeling"
  year: 2025
  doi: "10.1021/acs.jcim.4c02167"
  url: "https://doi.org/10.1021/acs.jcim.4c02167"
  arxiv_id: null
  abstract: "This work focuses on the impact of lateral interactions on the thermophysical properties of adsorbates. We present different parametrizations for coverage-dependent enthalpy, entropy, and heat capacity in a mean-field microkinetic model. These models are tested against two systems, CO/Pt(111) and CO/Co(0001), using two different functionals. A detailed investigation into how coverage influences the thermophysical properties of CO* is presented. We place particular emphasis on studying the impact of coverage on the vibrational partition function and how this affects the entropy of adsorbates. Higher coverages typically lead to increased repulsive interactions, which should further constrain the large amplitude modes that contribute the most to the vibrational entropy. In some cases, however, the opposite effect occurred; the vibrational entropy actually increased because surface crowding forced adsorbates to different binding locations that had lower frequencies. Our results highlighted cases where coverage-dependent entropy should be included, such as for adsorbates with lateral vibrational modes and systems at high temperatures. These methods for including coverage-dependent properties into mean-field microkinetics in a thermodynamically consistent way are now available in the open-source software Cantera."
  preprint: false
  corresponding_author: false
  featured: false
  image: "images_large_ci4c02167_0010.jpeg"

- title: "Unifying Thermochemistry Concepts in Computational Heterogeneous Catalysis"
  authors: "Kreitz B, Gusmão GS, Nai D, Sahoo SJ, Peterson AA, Bross DH, Goldsmith CF, Medford AJ"
  journal: "Chemical Society Reviews"
  year: 2025
  doi: "10.1039/D4CS00768A"
  url: "https://doi.org/10.1039/D4CS00768A"
  arxiv_id: null
  abstract: "Thermophysical properties of adsorbates and gas-phase species define the free energy landscape of heterogeneously catalyzed processes and are pivotal for an atomistic understanding of the catalyst performance. These thermophysical properties, such as the free energy or the enthalpy, are typically derived from density functional theory (DFT) calculations. Enthalpies are species-interdependent properties that are only meaningful when referenced to other species. The widespread use of DFT has led to a proliferation of new energetic data in the literature and databases. However, there is a lack of consistency in how DFT data is referenced and how the associated enthalpies or free energies are stored and reported, leading to challenges in reproducing or utilizing the results of prior work. Additionally, DFT suffers from exchange–correlation errors that often require corrections to align the data with other global thermochemical networks, which are not always clearly documented or explained. In this review, we introduce a set of consistent terminology and definitions, review existing approaches, and unify the techniques using the framework of linear algebra. This set of terminology and tools facilitates the correction and alignment of energies between different data formats and sources, promoting the sharing and reuse of ab initio data. Standardization of thermochemistry concepts in computational heterogeneous catalysis reduces computational cost and enhances fundamental understanding of catalytic processes, which will accelerate the computational design of optimally performing catalysts."
  preprint: false
  corresponding_author: true
  featured: false
  image: "thermo-toc.png"

- title: "Multilevel On-the-Fly Sparse Grids for Coupling Coarse-Grained and High Fidelity Models in Heterogeneous Catalysis"
  authors: "Hülser T, Kreitz B, Goldsmith CF, Matera S"
  journal: "Computers & Chemical Engineering"
  year: 2025
  doi: "10.1016/j.compchemeng.2024.108922"
  url: "https://doi.org/10.1016/j.compchemeng.2024.108922"
  arxiv_id: null
  abstract: "Coupling microscopic high-fidelity models, such as microkinetic models, into continuum scale simulations can easily become intractable in practice due to the costs of the high-fidelity model evaluation. To lift this burden, we present a novel multilevel self-consistent on-the-fly sparse grid approach, which integrates the construction of surrogates of the high-fidelity model in a multilevel fashion into the continuum solution process. Besides its efficiency, an appealing feature of the approach is its simplicity and robustness. A single hyperparameter controls the whole workflow, from training set design to the accuracy of the reactor model. We demonstrate the methodology on a recent microkinetic model for catalytic combustion in a fixed-bed reactor model as a representative example. Already with modest numbers of data, the approach achieves sufficient accuracy, reducing the effort by orders of magnitude compared to a direct coupling."
  preprint: false
  corresponding_author: false
