- title: "Non-Idealities in Lab-Scale Kinetic Testing: A Theoretical Study of a Modular Temkin Reactor"
  authors: "Wehinger GD, Kreitz B, Goldsmith CF"
  journal: "Catalysts"
  year: 2022
  doi: "10.3390/catal12030349"
  url: "https://doi.org/10.3390/catal12030349"
  arxiv_id: null
  abstract: "The Temkin reactor can be applied for industrial relevant catalyst testing with unmodified catalyst particles. It was assumed in the literature that this reactor behaves as a cascade of continuously stirred tank reactors (CSTR). However, this assumption was based only on outlet gas composition or inert residence time distribution measurements. The present work theoretically investigates the catalytic CO2 methanation as a test case on different catalyst geometries, a sphere, and a ring, inside a single Temkin reaction chamber under isothermal conditions. Axial gas-phase species profiles from detailed computational fluid dynamics (CFD) are compared with a CSTR and 1D plug-flow reactor (PFR) model using a sophisticated microkinetic model. In addition, a 1D chemical reactor network (CRN) model was developed, and model parameters were adjusted based on the CFD simulations. Whereas the ideal reactor models overpredict the axial product concentrations, the CRN model results agree well with the CFD simulations, especially under low to medium flow rates. This study shows that complex flow patterns greatly influence species fields inside the Temkin reactor. Although residence time measurements suggest CSTR-like behavior, the reactive flow cannot be described by either a CSTR or PFR model but with the developed CRN model."
  preprint: false
  corresponding_author: false
  featured: false
  image: "catalysts-12-00349-ag.png"

