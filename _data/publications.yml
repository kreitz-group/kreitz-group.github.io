- title: "Spray-Dried Ni Catalysts with Tailored Properties for CO2 Methanation"
  authors: "Kreitz B, Martínez Arias A, Martin J, Weber AP, Turek T"
  journal: "Catalysts"
  year: 2020
  doi: "10.3390/catal10121410"
  url: "https://doi.org/10.3390/catal10121410"
  arxiv_id: null
  abstract: "A catalyst production method that enables the independent tailoring of the structural properties of the catalyst, such as pore size, metal particle size, metal loading or surface area, allows to increase the efficiency of a catalytic process. Such tailoring can help to make the valorization of CO2 into synthetic fuels on Ni catalysts competitive to conventional fossil fuel production. In this work, a new spray-drying method was used to produce Ni catalysts supported on SiO2 and Al2O3 nanoparticles with tunable properties. The influence of the primary particle size of the support, different metal loadings, and heat treatments were applied to investigate the potential to tailor the properties of catalysts. The catalysts were examined with physical and chemical characterization methods, including X-ray diffraction, temperature-programmed reduction, and chemisorption. A temperature-scanning technique was applied to screen the catalysts for CO2 methanation. With the spray-drying method presented here, well-organized porous spherical nanoparticles of highly dispersed NiO nanoparticles supported on silica with tunable properties were produced and characterized. Moreover, the pore size, metal particle size, and metal loading can be controlled independently, which allows to produce catalyst particles with the desired properties. Ni/SiO2 catalysts with surface areas of up to 40 m2 g−1 with Ni crystals in the range of 4 nm were produced, which exhibited a high activity for the CO2 methanation."
  preprint: false
  corresponding_author: true
  featured: false
  image: "catalysts-10-01410-ag.png"

- title: "Characterization of a modular Temkin reactor with experiments and computational fluid dynamics simulations"
  authors: "Wehinger GD, Kreitz B, Nagy A, Turek T"
  journal: "Chemical Engineering Journal"
  year: 2020
  doi: "10.1016/j.cej.2020.124342"
  url: "https://doi.org/10.1016/j.cej.2020.124342"
  arxiv_id: null
  abstract: "The determination of reaction kinetics without the influence of transport limitations is challenging, especially under industrially relevant conditions, particle shapes, and sizes. The Temkin reactor concept, developed in the 1960s, allows to measure reaction kinetics with a small number of unmodified catalyst particles operating under assumed isothermal and plug-flow conditions. In this study, a recently developed modular Temkin reactor design is studied experimentally and with detailed CFD simulations in order to shed light on the residence time distribution without reaction. Cold fluid volumetric flow rates are varied in the range of 50–200 and two different particle shapes (spheres and rings) are tested. Pulse experiments and passive scalar computational fluid dynamics (CFD) simulations verify that this reactor design behaves like a cascade of stirred tank reactors with Bodenstein numbers of each chamber smaller than three. Mean age of air CFD simulations highlight potentials to re-design the entrance of the chamber in order to minimize stagnation zones."
  preprint: false
  corresponding_author: false
  featured: false
  image: "1-s2.0-S1385894720303338-ga1_lrg.jpg"

- title: "Measuring Adsorption Capacity of Supported Catalysts with a Novel Quasi-Continuous Pulse Chemisorption Method"
  authors: "Friedland J, Kreitz B, Grimm H, Turek T, Güttel R"
  journal: "ChemCatChem"
  year: 2020
  doi: "10.1002/cctc.202000278"
  url: "https://doi.org/10.1002/cctc.202000278"
  arxiv_id: null
  abstract: "An improved pulse-chemisorption technique is presented, which is proven to be independent of the strength of interaction between adsorptive and catalyst material. The methodology is based on the transient mass balance of the adsorptive, allowing for quantitative evaluation of the pulse-signal obtained from the experiment. Two experimental strategies for determination of the adsorption capacity are introduced, with and without using an internal standard. The methodology is illustratively discussed based on simulation results and verified by chemisorption experiments of hydrogen and carbon dioxide on a supported nickel catalyst. In addition, temperature and dosing effects are examined and benchmarked with volumetric measurements of the adsorption capacity. The proposed mathematical evaluation method of the measured data can be applied directly to experiments performed in standard equipment for pulse-chemisorption or in modified catalyst test rigs to measure adsorption capacity before and after reaction experiments. The technique shows potential for determination of sorption kinetics and combination with operando spectroscopy."
  preprint: false
  corresponding_author: false
  featured: false
  image: "cctc202000278-toc-0001-m.jpg"

- title: "Development of a Microkinetic Model for the CO2 Methanation with an Automated Reaction Mechanism Generator"
  authors: "Kreitz B, Wehinger GD, Goldsmith CF, Turek T"
  journal: "Computer Aided Chemical Engineering (ESCAPE 30)"
  year: 2020
  doi: "10.1016/B978-0-12-823377-1.50089-6"
  url: "https://doi.org/10.1016/B978-0-12-823377-1.50089-6"
  arxiv_id: null
  abstract: "The automated reaction mechanism generator (RMG) is used to investigate the methanation of CO2 on the Ni(111) and Ni(211) surface. Linear scaling relations are applied for the thermochemistry of the adsorbates, which are compared to state-of-the-art electronic structure calculations and show a reasonable predictability. RMG discovers nearly the same amount of species and reactions for both facets. However, a reaction path analysis in a reactor simulation shows that the reaction pathways on both surfaces differ significantly, which is caused by the difference in the binding energy of the adsorbates. Reactor simulations reveal a lower methane production rate compared to experiments obtained in a Berty reactor with a Ni/Al2O3 catalyst, which is a result of a high surface coverage with CO⁎ and demands, therefore, the inclusion of a coverage dependent heat of formation of the adsorbates."
  preprint: false
  corresponding_author: true
