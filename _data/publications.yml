  image: ""

- title: "Computational Fluid Dynamics Simulation of CO2 Methanation in a Fixed-bed Profile Reactor"
  authors: "Flaischlen S, Martin J, Kreitz B, Turek T, Wehinger GD"
  journal: "Computer Aided Chemical Engineering (ESCAPE 30)"
  year: 2020
  doi: "10.1016/B978-0-12-823377-1.50084-7"
  url: "https://doi.org/10.1016/B978-0-12-823377-1.50084-7"
  arxiv_id: null
  abstract: "In this contribution, we present a detailed three-dimensional computational fluid dynamics (CFD) model of a fixed-bed reactor processing the catalytic CO2 methanation reaction. Due to the small tube-to-particle-diameter ratio, particle-resolved CFD simulations are carried out, since they can locally account for transport phenomena, i.e. momentum, heat, and mass transfer. In addition to the interstitial flow simulation, three-dimensional diffusion plus reaction is modelled inside the catalytic pellets. The comparison in terms of axial temperature with a one-dimensional model shows the discrepancy between the models. Additional CFD simulations with different pellet shapes show that the shape has little influence on the heat transfer in these slender fixed-bed arrangements. Experimental results of axial concentration profiles will further validate the CFD model."
  preprint: false
  corresponding_author: false
  featured: false
  image: ""

- title: "Dynamic Methanation of CO2 – Effect of Concentration Forcing"
  authors: "Kreitz B, Friedland J, Güttel R, Wehinger GD, Turek T"
  journal: "Chemie Ingenieur Technik"
  year: 2019
  doi: "10.1002/cite.201800191"
  url: "https://doi.org/10.1002/cite.201800191"
  arxiv_id: null
  abstract: "Investigating the effect of concentration forcing of the CO2 methanation is not only relevant for power-to-gas plants but also for the study of dynamic phenomena of this reaction. In this study a Ni/Al2O3 catalyst is investigated under concentration forcing at industrially relevant conditions. The dynamic experiments allow an evaluation in terms of the reaction rate and enable the study of the reaction mechanism. The experiments show that no methane is formed in the CO2-rich part of the cycle, whereas a fast hydrogenation of carbonaceous species to methane takes place upon switching to H2."
