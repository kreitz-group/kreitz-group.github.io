# People data for the Kreitz Research Group website
#
# Fields:
#   id            - unique slug (kebab-case)
#   name          - full name
#   status        - "pi" | "current" | "alumni"
#   type          - (for current members) "graduate" | "undergraduate"
#   role          - e.g. "Assistant Professor", "Ph.D. Student", "Undergraduate Researcher"
#   photo         - filename in assets/images/people/ (leave "" if no photo)
#   education     - education background (one line)
#   info          - short bio or awards (can be empty "")
#   year_joined   - integer year (used to sort current members)
#   current_position - for alumni: their current role elsewhere
#   email         - email address (leave "" to hide)
#   github        - GitHub profile URL (leave "" to hide)
#   google_scholar - Google Scholar URL (leave "" to hide)
#   linkedin      - LinkedIn URL (leave "" to hide)
#   cv_url        - path to CV PDF (leave "" to hide)

