  education: "B.S. Chemical Engineering, North Carolina State University (2025)"
  info: "Conor O’Brien earned his B.S. in Chemical Engineering from North Carolina State University in 2025. During his undergraduate studies, he performed experimental heterogeneous catalysis research on the dry reforming of methane in Dr. Fanxing Li’s group, focusing on the porosity engineering of mesoporous silica supports. At Georgia Tech, his research focuses on a combination of computations and validating experiments in the theory-driven design of metal nanoparticles with enhanced regioselectivity for propylene hydroformylation. In his free time, he enjoys weightlifting, watching sports and movies, playing videogames, playing basketball, hiking, and cooking"
