- id: bjarne-kreitz
  name: "Bjarne Kreitz"
  role: "Assistant Professor"
  status: pi
  photo: "kreitz.jpg"
  education: "B.Sc. (2015), M.Sc. (2016), Dr.-Ing. (2021), Clausthal University of Technology; Postdoctoral Fellow, Brown University (2021–2024)"
  info: "Dr. Kreitz is an Assistant Professor at the Georgia Institute of Technology in the School of Chemical and Biomolecular Engineering since January 2025. He obtained a B. Sc. (2015), M. Sc. (2016) and Dr.-Ing. (2021) from Clausthal University of Technology (Germany) in Chemical Engineering. His postdoctoral research at Brown University (2021-2024) was funded by the Feodor Lynen Postdoctoral Scholarship of the Alexander von Humboldt Foundation. Recently, Dr. Kreitz received the Hanns Hofmann Award of the DECHEMA/VDI subject division Reaction Engineering. He is also a committee member of the NaWuReT, a German early career chemical engineer group that organizes events to foster a vibrant chemical engineering community. Outside of work, you will probably see him running through Piedmont Park, bouldering at a nearby climbing gym, sipping on a craft beer, or on a trail somewhere..."
  current_position: "Assistant Professor, Georgia Tech ChBE"
