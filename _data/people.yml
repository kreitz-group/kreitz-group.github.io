  info: "Seth is a Ph.D. student in Chemical and Biomolecular Engineering at Georgia Tech. He earned his B.S. in Chemical Engineering from Auburn University in May 2021 and worked as a Process Engineer and Production Supervisor for WestRock for three years before enrolling at Georgia Tech. His research seeks to explore automated reaction mechanism generation for metal oxide catalysts to study oxidative dehydrogenation reactions of alkanes. During his free time, Seth enjoys staying active by running triathlons, rock climbing, and playing disc golf."
